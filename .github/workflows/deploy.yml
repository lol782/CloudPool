name: Deploy to Kubernetes

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has-kubeconfig: ${{ steps.check.outputs.has-kubeconfig }}
    steps:
      - name: Check if KUBECONFIG secret is configured
        id: check
        run: |
          if [ -n "${{ secrets.KUBECONFIG }}" ]; then
            echo "has-kubeconfig=true" >> $GITHUB_OUTPUT
          else
            echo "has-kubeconfig=false" >> $GITHUB_OUTPUT
            echo "::notice::KUBECONFIG secret is not set - skipping Kubernetes deploy"
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.has-kubeconfig == 'true'

    steps:
    - uses: actions/checkout@v4

    - name: Configure kubectl
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: Deploy to Kubernetes
      run: |
        kubectl set image deployment/cloudpool-api \
          cloudpool-api=${{ secrets.DOCKER_USERNAME }}/cloudpool:${{ github.sha }} \
          -n cloudpool
        kubectl rollout status deployment/cloudpool-api -n cloudpool --timeout=120s

    - name: Run smoke tests
      run: |
        kubectl run smoke-test \
          --image=curlimages/curl:latest \
          --rm -i --restart=Never \
          -- curl -f http://cloudpool-api:80/actuator/health || exit 1
