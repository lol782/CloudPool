spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cloudpool_test}
    username: ${SPRING_DATASOURCE_USERNAME:cloudpool}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}

  cache:
    type: simple

cloudpool:
  jwt:
    secret: ${CLOUDPOOL_JWT_SECRET:d1f88c8078c1db294e82b71be5e8f6e80b2a75ffca79b9e6e6a1a8c3d6e5a6b0c2e3f4g5h6j7k8l9m0n1p2q3r4s5t6u7v8w9x0y1z2a3b4c5d6e7f8g9}
    expiration: 86400000
  google-drive:
    client-id: ${CLOUDPOOL_GOOGLE_DRIVE_CLIENT_ID:dummy-client-id}
    client-secret: ${CLOUDPOOL_GOOGLE_DRIVE_CLIENT_SECRET:dummy-client-secret}
