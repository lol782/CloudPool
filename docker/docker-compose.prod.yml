version: '3.8'

services:
  api1:
    image: cloudpool:latest
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DATABASE_HOST=postgres
      - REDIS_HOST=redis
      - WEAVIATE_URL=http://weaviate:8080
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - weaviate

  api2:
    image: cloudpool:latest
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DATABASE_HOST=postgres
      - REDIS_HOST=redis
      - WEAVIATE_URL=http://weaviate:8080
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - weaviate

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
