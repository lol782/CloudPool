global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'cloudpool-monitor'

scrape_configs:
  - job_name: 'spring-boot'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api1:8080', 'api2:8080', 'localhost:8080']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'weaviate'
    static_configs:
      - targets: ['weaviate:8080']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15672']

rule_files:
  - 'alerts.yml'
